services:
  app:
    build: .
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: portfolio
      DB_USER: portfolio
      DB_PASS: portfolio_secret
      APP_ENV: production
      APP_DEBUG: "false"
      SESSION_SECRET: ${SESSION_SECRET:-}
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    build: ./database
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio"]
      interval: 3s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
uploads: